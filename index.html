<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Avynn's Story Archive</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --blue:#2D8EFF;
  --blue-bright:#4FA3FF;
  --blue-dim:#1A5FAA;
  --blue-pale:#050D1A;
  --navy:#0A1628;
  --navy-2:#0D1E35;
  --navy-3:#112445;
  --midnight:#060A10;
  --midnight-2:#080D16;
  --midnight-3:#0C1220;
  --text:#F4F8FF;
  --text-body:#C0CFEA;
  --text-muted:#5A7099;
  --border:#1A2A42;
  --border-bright:#243A5C;
  /* GOLD — Avynn's accent, distinct from the blue */
  --gold:#C9A84C;
  --gold-bright:#E8C97A;
  --gold-dim:#7A5E1A;
  --gold-glow:rgba(201,168,76,.18);
}

body{
  background:var(--midnight);
  color:var(--text);
  font-family:'Barlow',sans-serif;
  font-weight:400;
  line-height:1.8;
  min-height:100vh;
  font-size:16px;
}

/* ── COVER ── */
.cover{
  min-height:100vh;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:3rem 2rem;text-align:center;
  background:radial-gradient(ellipse at 50% 40%, #0A1628 0%, #060A10 70%);
  position:relative;overflow:hidden;
}
/* subtle star field on cover */
.cover::before{
  content:'';position:absolute;inset:0;
  background-image:
    radial-gradient(circle,rgba(232,201,122,.6) 1px,transparent 1px),
    radial-gradient(circle,rgba(79,163,255,.4) 1px,transparent 1px),
    radial-gradient(circle,rgba(244,248,255,.5) 1px,transparent 1px);
  background-size:180px 160px, 220px 200px, 140px 130px;
  background-position:0 0, 80px 60px, 40px 100px;
  pointer-events:none;opacity:.45;
}
.cover-eyebrow{font-size:11px;letter-spacing:.3em;text-transform:uppercase;color:var(--gold);margin-bottom:1.6rem;position:relative;}
.cover h1{
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(2.8rem,8vw,5rem);
  font-weight:600;color:var(--text);
  line-height:1.05;margin-bottom:.6rem;position:relative;
}
.cover h1 em{color:var(--gold-bright);font-style:italic;}
.cover-rule{width:80px;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin:1.8rem auto;position:relative;}
.cover-sub{font-size:11px;letter-spacing:.3em;text-transform:uppercase;color:var(--text-muted);margin-bottom:2.5rem;position:relative;}
.cover-verse{
  font-family:'Cormorant Garamond',serif;font-style:italic;
  font-size:19px;color:var(--text-body);max-width:440px;
  margin:0 auto 2.75rem;
  border-left:2px solid var(--gold);padding-left:1.5rem;
  text-align:left;line-height:1.9;position:relative;
}
.cover-verse cite{
  display:block;font-style:normal;font-size:11px;
  font-family:'Barlow',sans-serif;color:var(--gold-bright);
  margin-top:10px;letter-spacing:.15em;
}
.start-btn{
  background:transparent;border:1px solid var(--gold);
  color:var(--gold-bright);font-family:'Barlow',sans-serif;
  font-size:12px;letter-spacing:.22em;text-transform:uppercase;
  padding:15px 52px;cursor:pointer;transition:all .25s;position:relative;
}
.start-btn:hover{background:var(--gold);color:var(--midnight);letter-spacing:.28em;}

/* ── APP ── */
.app{display:none;max-width:900px;margin:0 auto;padding:2rem 1.75rem 5rem;}

/* ── TOP NAV ── */
.top-nav{
  display:flex;gap:2px;margin-bottom:2.5rem;
  border-bottom:1px solid var(--border);overflow-x:auto;
}
.tnb{
  background:transparent;border:none;
  border-bottom:2px solid transparent;
  color:var(--text-muted);font-family:'Barlow',sans-serif;
  font-size:11px;letter-spacing:.18em;text-transform:uppercase;
  padding:12px 16px;cursor:pointer;white-space:nowrap;
  margin-bottom:-1px;transition:all .15s;font-weight:400;
}
.tnb.active{color:var(--gold-bright);border-bottom-color:var(--gold);}
.tnb:hover:not(.active){color:var(--text);}
.panel{display:none;}.panel.active{display:block;}

/* ── TYPOGRAPHY ── */
.sec-title{
  font-family:'Cormorant Garamond',serif;font-size:36px;
  font-weight:600;color:var(--text);margin-bottom:6px;line-height:1.15;
}
.sec-sub{font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--gold);margin-bottom:2rem;}
.body-text{font-size:15px;color:var(--text-body);line-height:1.9;margin-bottom:1.75rem;}
.divider{border:none;border-top:1px solid var(--border);margin:2.25rem 0;}
.gold-rule{width:50px;height:1px;background:linear-gradient(90deg,var(--gold),transparent);margin:1.75rem 0;}

/* ── WEEK GRID ── */
.week-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:2.25rem;}
.wk-btn{
  background:var(--midnight-2);border:1px solid var(--border);
  padding:14px 10px;text-align:center;cursor:pointer;transition:all .15s;
}
.wk-btn:hover{border-color:var(--gold-dim);background:var(--navy);}
.wk-btn.active{border-color:var(--gold);background:rgba(201,168,76,.06);}
.wk-num{font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--gold-bright);margin-bottom:4px;font-weight:500;}
.wk-name{font-family:'Cormorant Garamond',serif;font-size:16px;color:var(--text);line-height:1.2;}
.wk-theme{font-size:11px;color:var(--text-muted);margin-top:4px;line-height:1.4;}

/* ── STORY HEADER GRAPHIC ── */
.story-header{
  width:100%;height:320px;
  position:relative;overflow:hidden;
  margin-bottom:0;
  border:1px solid var(--border);
  border-bottom:none;
}
.story-header svg{width:100%;height:100%;display:block;}
/* carbon fiber strip at top of graphic */
.story-header::before{
  content:'';position:absolute;top:0;left:0;right:0;height:4px;
  background:repeating-linear-gradient(90deg,rgba(201,168,76,.4) 0,rgba(201,168,76,.4) 1px,transparent 1px,transparent 5px);
  z-index:2;
}
/* gold glow line at bottom of graphic */
.story-header::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,var(--gold),transparent);
  opacity:.6;z-index:2;
}

/* ── STORY CARD ── */
.story-card{
  background:var(--navy);border:1px solid var(--border);
  border-top:3px solid var(--gold);margin-bottom:2.5rem;
  transition:border-color .2s;
}
.story-card:hover{border-color:rgba(201,168,76,.4);}
.story-meta{
  display:flex;align-items:center;justify-content:space-between;
  padding:1.4rem 1.75rem 1rem;
  border-bottom:1px solid var(--border);
}
.story-night{font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);font-weight:500;}
.story-ref{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--text-muted);}
.story-title{
  font-family:'Cormorant Garamond',serif;font-size:28px;
  font-weight:600;color:var(--text);padding:1.2rem 1.75rem .5rem;line-height:1.2;
}
.story-body{padding:.5rem 1.75rem 1.75rem;}

/* ── STORY LINES — each line gets its own row with subtle graphic accent ── */
.story-lines{margin:1rem 0 1.5rem;}
.story-line{
  display:flex;align-items:flex-start;gap:14px;
  padding:10px 0;border-bottom:1px solid rgba(26,42,66,.6);
  font-size:16px;color:var(--text-body);line-height:1.75;
}
.story-line:last-child{border-bottom:none;}
/* the accent mark per line — tiny gold SVG icon */
.line-icon{
  flex-shrink:0;width:22px;height:22px;
  margin-top:3px;opacity:.7;
}
.story-line strong{color:var(--text);}
.story-line em{color:var(--gold-bright);font-style:italic;}

/* ── VERSE BLOCK ── */
.verse-block{
  background:var(--navy-2);border-left:3px solid var(--gold-bright);
  padding:1.4rem 1.6rem;margin:1.25rem 0;
  font-family:'Cormorant Garamond',serif;font-style:italic;
  font-size:20px;color:var(--text);line-height:1.85;
}
.verse-block cite{
  display:block;font-style:normal;font-size:11px;
  font-family:'Barlow',sans-serif;color:var(--gold-bright);
  margin-top:10px;letter-spacing:.14em;font-weight:500;
}

/* ── SAY IT STRIP ── */
.say-it{
  background:rgba(201,168,76,.07);
  border-left:3px solid var(--gold);
  padding:1rem 1.4rem;margin:1.25rem 0;
}
.say-label{font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);display:block;margin-bottom:.4rem;font-weight:500;}
.say-text{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:19px;color:var(--text-body);}

/* ── PRAYER BLOCK ── */
.prayer-card{
  background:var(--midnight-2);border:1px solid var(--border);
  border-top:2px solid var(--gold-dim);padding:1.5rem;margin:1.5rem 0;
}
.prayer-card h4{
  font-size:11px;letter-spacing:.18em;text-transform:uppercase;
  color:var(--gold);margin-bottom:.9rem;padding-bottom:.7rem;
  border-bottom:1px solid var(--border);font-weight:500;
}
.prayer-card p{
  font-family:'Cormorant Garamond',serif;font-style:italic;
  font-size:17px;color:var(--text-body);line-height:1.9;
}
.prayer-card cite{
  display:block;font-style:normal;font-size:12px;
  font-family:'Barlow',sans-serif;color:var(--text-muted);
  margin-top:.8rem;
}

/* ── PROGRESS ── */
.progress-wrap{margin-bottom:2.25rem;}
.progress-top{display:flex;justify-content:space-between;font-size:12px;color:var(--text-muted);margin-bottom:8px;}
.progress-bar{height:3px;background:var(--midnight-3);}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--gold-dim),var(--gold-bright));transition:width .5s;}

/* ── SEAL ── */
.seal{
  text-align:center;padding:3.5rem 1rem;
  border-top:1px solid var(--border);margin-top:2.5rem;
}
.seal p{
  font-family:'Cormorant Garamond',serif;font-style:italic;
  font-size:24px;color:var(--text-body);max-width:480px;
  margin:0 auto 10px;line-height:1.5;
}
.seal cite{
  font-size:11px;letter-spacing:.2em;text-transform:uppercase;
  color:var(--gold-bright);font-style:normal;
  font-family:'Barlow',sans-serif;font-weight:500;
}

/* ── BACK BUTTON ── */
.back-btn{
  background:transparent;border:none;
  color:var(--text-muted);font-family:'Barlow',sans-serif;
  font-size:11px;letter-spacing:.2em;text-transform:uppercase;
  cursor:pointer;padding:0;margin-bottom:2rem;display:inline-block;
  transition:color .15s;
}
.back-btn:hover{color:var(--gold-bright);}

/* ── ARCHIVE NAV (week overview) ── */
.archive-intro{
  padding:2rem 0 1.5rem;
}
.archive-intro p{font-size:15px;color:var(--text-body);line-height:1.9;margin-bottom:1.5rem;}
.week-card{
  background:var(--navy);border:1px solid var(--border);
  border-left:3px solid var(--gold-dim);
  padding:1.5rem 1.75rem;margin-bottom:1rem;
  cursor:pointer;transition:all .15s;
  display:flex;align-items:center;gap:1.5rem;
}
.week-card:hover{border-left-color:var(--gold);background:var(--navy-2);}
.week-card-num{
  font-size:11px;letter-spacing:.2em;text-transform:uppercase;
  color:var(--gold);font-weight:500;flex-shrink:0;width:60px;
}
.week-card-content{flex:1;}
.week-card-name{
  font-family:'Cormorant Garamond',serif;font-size:22px;
  color:var(--text);margin-bottom:2px;
}
.week-card-theme{font-size:13px;color:var(--text-muted);}
.week-card-count{font-size:11px;color:var(--gold-bright);letter-spacing:.1em;}

/* ── STORY LIST (inside a week) ── */
.story-list-item{
  background:var(--midnight-2);border:1px solid var(--border);
  padding:1.2rem 1.5rem;margin-bottom:.6rem;
  cursor:pointer;transition:all .15s;
  display:flex;align-items:center;gap:1.25rem;
}
.story-list-item:hover{border-color:var(--gold-dim);background:var(--navy);}
.sli-night{font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);flex-shrink:0;width:70px;font-weight:500;}
.sli-title{font-family:'Cormorant Garamond',serif;font-size:19px;color:var(--text);}
.sli-ref{font-size:12px;color:var(--text-muted);margin-top:2px;}
.sli-arrow{color:var(--text-muted);font-size:16px;margin-left:auto;}

/* responsive */
@media(max-width:600px){
  .week-grid{grid-template-columns:repeat(2,1fr);}
  .app{padding:1.5rem 1rem 4rem;}
  .story-header{height:240px;}
  .story-title{font-size:22px;}
  .week-card{flex-direction:column;align-items:flex-start;gap:.5rem;}
  .week-card-num{width:auto;}
}
</style>
</head>
<body>

<!-- COVER -->
<div class="cover" id="cover">
  <div>
    <div class="cover-eyebrow">For Avynn Renee Campbell</div>
    <h1>The Story<br><em>Archive</em></h1>
    <div class="cover-rule"></div>
    <p class="cover-sub">Eight Weeks · Nightly Bible Stories · Made with Love</p>
    <div class="cover-verse">
      Train up a child in the way she should go, and when she is old she will not depart from it.
      <cite>Proverbs 22:6 · CSB</cite>
    </div>
    <button class="start-btn" onclick="startApp()">Open the Archive</button>
  </div>
</div>

<!-- APP -->
<div class="app" id="app"></div>

<script>
/* ═══════════════════════════════════════════════
   STORY DATA — 8 weeks × 5 nights each
   ═══════════════════════════════════════════════ */
const WEEKS = [
  {
    name:"In the Beginning",
    theme:"God creates the world — and creates Avynn",
    stories:[
      {
        night:"Night 1",
        title:"God Creates the World",
        ref:"Genesis 1",
        verse:{text:"In the beginning God created the heavens and the earth.",cite:"Genesis 1:1 · CSB"},
        color:"#003366",
        accentColor:"#4FA3FF",
        headerType:"creation",
        lines:[
          {icon:"star", text:"Before anything existed — before the sun, the moon, the animals, before <em>you</em> — there was <strong>God.</strong>"},
          {icon:"star", text:"And God looked out at nothing at all. Just darkness. Just empty space."},
          {icon:"light", text:"<em>\"Let there be light!\"</em> He said. And light came blazing into the world like it had been waiting all along."},
          {icon:"star", text:"He separated the light from the dark — <strong>Day and Night.</strong> He called them both good."},
          {icon:"water", text:"He pushed the waters apart and sky appeared. He gathered the waters and dry land rose up."},
          {icon:"leaf", text:"Trees and flowers and every kind of plant burst out of the ground. Every color, every shape — <strong>all His idea.</strong>"},
          {icon:"star", text:"He put the sun in the sky for daytime. He scattered a million stars across the night for you to look at."},
          {icon:"fish", text:"He filled the oceans with fish. He filled the sky with birds. He filled the land with every creature imaginable."},
          {icon:"heart", text:"And then — last of all — He made <em>people.</em> Made them like Himself. Made them to walk with Him."},
          {icon:"gold", text:"He looked at everything He had made. Every single bit of it. And He said: <strong>\"It is very good.\"</strong>"},
        ],
        sayIt:"God made everything — and everything He made is good!",
        prayer:"God, thank You for making the whole world. Thank You for making the sun and the moon and all the stars. Thank You that You said it was good. And thank You for making me. I love You. Amen."
      },
      {
        night:"Night 2",
        title:"Noah and the Big Boat",
        ref:"Genesis 6–8",
        verse:{text:"God remembered Noah.",cite:"Genesis 8:1 · CSB"},
        color:"#002244",
        accentColor:"#40AAFF",
        headerType:"ark",
        lines:[
          {icon:"rain", text:"A long time ago, the world had gotten very sad. People had forgotten about God and were doing bad things."},
          {icon:"heart", text:"But one man still loved God with his whole heart. His name was <strong>Noah.</strong>"},
          {icon:"wood", text:"God said, <em>\"Build Me a big boat, Noah — bigger than anything you've ever seen.\"</em> And Noah obeyed."},
          {icon:"animals", text:"God told Noah to bring two of every animal onto the boat. Can you imagine? Two elephants! Two giraffes! Two of everything!"},
          {icon:"rain", text:"Then the rain came. <strong>Forty days and forty nights</strong> of pouring, splashing, rushing rain."},
          {icon:"water", text:"The whole earth was covered with water. But Noah and his family — and all those animals — were <em>safe on the boat.</em>"},
          {icon:"star", text:"Then one day the rain stopped. Slowly, slowly, the water went down."},
          {icon:"dove", text:"Noah sent out a dove. The dove came back with an <strong>olive leaf.</strong> Land!"},
          {icon:"rainbow", text:"They stepped off the boat. And God put a beautiful rainbow in the sky. <em>\"I will never flood the whole earth again,\"</em> He promised."},
          {icon:"heart", text:"Every time you see a rainbow, Avynn — that's <strong>God's promise</strong> painted across the sky."},
        ],
        sayIt:"God remembered Noah — and God always remembers me!",
        prayer:"God, thank You for keeping Noah safe on the big boat. Thank You that You always keep Your promises. When I see a rainbow, help me remember that You love me. Amen."
      },
      {
        night:"Night 3",
        title:"Baby Moses in the Basket",
        ref:"Exodus 2",
        verse:{text:"When she saw that he was a beautiful child, she hid him for three months.",cite:"Exodus 2:2 · CSB"},
        color:"#0A2830",
        accentColor:"#00CCAA",
        headerType:"moses_baby",
        lines:[
          {icon:"heart", text:"A mama had a baby boy. And from the very first moment she saw him, she loved him <em>completely.</em>"},
          {icon:"star", text:"His name was <strong>Moses.</strong> And he was so beautiful and so perfect."},
          {icon:"water", text:"The mama made a little basket out of reeds — like a tiny boat. She put soft blankets inside."},
          {icon:"heart", text:"She held her baby close one last time. She kissed him. She prayed over him. <em>\"God, protect this little boy.\"</em>"},
          {icon:"water", text:"She placed the basket in the river. She watched it float away. <strong>Her heart was breaking and trusting at the same time.</strong>"},
          {icon:"eye", text:"Moses' big sister Miriam hid nearby and watched. She was not going to let her little brother float away alone."},
          {icon:"crown", text:"A princess came to the river. She heard crying. She opened the basket and saw the baby — and her heart melted."},
          {icon:"star", text:"<em>\"This must be a Hebrew baby,\"</em> she said. And she decided right then — <strong>\"I will save him.\"</strong>"},
          {icon:"heart", text:"Miriam ran up and said, <em>\"Should I find someone to take care of him?\"</em> The princess said yes. And Miriam brought the baby's own mama!"},
          {icon:"gold", text:"God put Moses right back in his mama's arms. <strong>God saw that baby floating in that basket. And He had a plan.</strong>"},
        ],
        sayIt:"God watched over Moses — and God watches over me!",
        prayer:"God, You watched over little baby Moses in that basket on the river. Thank You that You watch over me too. Even when things feel scary, You always have a plan. Amen."
      },
      {
        night:"Night 4",
        title:"The Burning Bush",
        ref:"Exodus 3–4",
        verse:{text:"I will be with you.",cite:"Exodus 3:12 · CSB"},
        color:"#1A0800",
        accentColor:"#FF8C00",
        headerType:"bush",
        lines:[
          {icon:"sheep", text:"Moses had grown up into a man. He lived in the desert, taking care of sheep under the big hot sun."},
          {icon:"fire", text:"One day he saw something strange — a bush was on <em>fire.</em> Blazing, golden, beautiful flames."},
          {icon:"fire", text:"But here was the amazing thing: <strong>the bush wasn't burning up.</strong> The fire just kept burning and burning."},
          {icon:"eye", text:"Moses walked closer. He had to see this. He had never seen anything like it in his whole life."},
          {icon:"star", text:"Then — right from inside the fire — a voice spoke. <em>\"Moses! Moses!\"</em>"},
          {icon:"heart", text:"Moses stopped. <strong>God knew his name.</strong> God had been watching him all along."},
          {icon:"sandal", text:"<em>\"Take off your sandals,\"</em> God said. <em>\"The ground where you are standing is holy ground.\"</em>"},
          {icon:"star", text:"Then God told Moses: <em>\"I have seen My people hurting in Egypt. I have heard them crying. I am sending <strong>you</strong> to help them.\"</em>"},
          {icon:"heart", text:"Moses was scared. <em>\"But who am I?\"</em> he asked. And God said the most important thing:"},
          {icon:"gold", text:"<strong>\"I will be with you.\"</strong> That was enough. God knows your name too, Avynn. And He is always with you."},
        ],
        sayIt:"God said 'I will be with you!' — and that's enough!",
        prayer:"God, thank You for calling Moses by name and meeting him right where he was. Thank You that You know my name too. Wherever I go, You go with me. I love You. Amen."
      },
      {
        night:"Night 5",
        title:"Crossing the Red Sea",
        ref:"Exodus 14",
        verse:{text:"The Lord will fight for you; you need only to be still.",cite:"Exodus 14:14 · CSB"},
        color:"#001830",
        accentColor:"#00BBFF",
        headerType:"red_sea",
        lines:[
          {icon:"people", text:"Moses led God's people out of Egypt. They were finally <em>free!</em> But then they hit a problem."},
          {icon:"water", text:"The Red Sea was right in front of them — huge, deep, and wide. <strong>No way across.</strong>"},
          {icon:"army", text:"And behind them? Pharaoh's whole army was charging. Chariots and horses and soldiers."},
          {icon:"fear", text:"The people were terrified. <em>\"What do we do?! We're trapped!\"</em>"},
          {icon:"heart", text:"But Moses stood up tall. <em>\"Do not be afraid! Stand firm and watch what God will do!\"</em>"},
          {icon:"staff", text:"God told Moses to raise his staff over the water. Moses walked to the edge and stretched it out over those dark waves."},
          {icon:"wind", text:"<strong>WHOOSH!</strong> A mighty wind blew all night. The water moved. It pushed. It split apart."},
          {icon:"water", text:"Two <strong>giant walls of water</strong> stood up on each side — and right down the middle was dry ground!"},
          {icon:"people", text:"Every single person walked right through. Children, mamas, dads, grandparents — <em>all safe on dry ground.</em>"},
          {icon:"gold", text:"When they reached the other side, Moses' sister Miriam grabbed her tambourine and <strong>danced and sang</strong> — because God had made a way!"},
        ],
        sayIt:"God made a way — He can always make a way for me!",

  {
    name:"Jesus Heals",
    theme:"Blind eyes see, lame legs walk, hearts are made whole",
    stories:[
      { night:"Night 1", title:"The Man Through the Roof", ref:"Mark 2", verse:{text:"Son, your sins are forgiven.",cite:"Mark 2:5 · CSB"}, color:"#1A0A00", accentColor:"#FF8800", headerType:"roof", lines:[{icon:"heart",text:"Four friends had a friend who couldn't walk. He'd been lying on a mat for years."},{icon:"people",text:"They heard Jesus was in a house nearby. So they picked up their friend — mat and all — and carried him."},{icon:"walk",text:"The house was so packed with people they couldn't even get to the door. No way in."},{icon:"star",text:"But these friends didn't give up. They climbed up on the <strong>roof.</strong>"},{icon:"gold",text:"They <em>dug through the roof</em> and lowered their friend down on his mat, right in front of Jesus."},{icon:"heart",text:"Jesus looked up. He saw their faith. And He was moved."},{icon:"star",text:"<em>\"Son, your sins are forgiven,\"</em> Jesus said. Then: <strong>\"Get up, pick up your mat, and go home.\"</strong>"},{icon:"gold",text:"The man <em>got up.</em> Picked up his mat. Walked home. The crowd was amazed."},{icon:"heart",text:"Those friends refused to let anything stop them from getting their friend to Jesus."},{icon:"star",text:"That's the kind of friend to be, Avynn — and that's the kind of faith to have. <strong>Get your people to Jesus.</strong>"}], sayIt:"Good friends bring each other to Jesus — no matter what it takes!", prayer:"Jesus, those four friends refused to give up. Help me have faith like that — and help me be a friend who brings people to You. Amen." },
      { night:"Night 2", title:"Blind Bartimaeus", ref:"Mark 10", verse:{text:"What do you want me to do for you?",cite:"Mark 10:51 · CSB"}, color:"#080808", accentColor:"#FFEE66", headerType:"bartimaeus", lines:[{icon:"eye",text:"A blind man named Bartimaeus sat by the road every day, begging. He couldn't see anything."},{icon:"people",text:"One day he heard a crowd coming. <em>\"What's happening?\"</em> he asked. Someone said: <strong>Jesus of Nazareth is passing by.</strong>"},{icon:"heart",text:"Bartimaeus didn't hesitate. He shouted as loud as he could — <em>\"Jesus! Have mercy on me!\"</em>"},{icon:"star",text:"People around him told him to be quiet. <strong>He shouted louder.</strong>"},{icon:"heart",text:"Jesus stopped. <em>\"Call him over,\"</em> He said."},{icon:"gold",text:"Bartimaeus jumped up and went to Jesus. Jesus asked him the most tender question: <em>\"What do you want Me to do for you?\"</em>"},{icon:"eye",text:"<em>\"I want to see,\"</em> Bartimaeus said. And immediately — <strong>he could.</strong>"},{icon:"heart",text:"Jesus said: <em>\"Go, your faith has saved you.\"</em> And Bartimaeus followed Jesus down the road."},{icon:"star",text:"He didn't let anyone quiet him down. He kept calling out to Jesus until Jesus stopped."},{icon:"gold",text:"You can do that too, Avynn. <strong>Keep calling out to Jesus. He always stops for you.</strong>"}], sayIt:"Jesus always stops for me — I can call out to Him anytime!", prayer:"Jesus, Bartimaeus kept calling even when people told him to be quiet. Help me never stop calling out to You. Thank You that You always stop and listen. Amen." },
      { night:"Night 3", title:"The Little Girl Jesus Raised", ref:"Mark 5", verse:{text:"Little girl, I say to you, get up!",cite:"Mark 5:41 · CSB"}, color:"#0A0A18", accentColor:"#AA88FF", headerType:"little_girl", lines:[{icon:"heart",text:"A man named Jairus was desperate. His little daughter was very, very sick."},{icon:"walk",text:"He ran to find Jesus and fell at His feet. <em>\"Please come. Please help her. She's only twelve years old.\"</em>"},{icon:"heart",text:"Jesus went with him. But on the way, news came: <em>\"Don't bother the teacher anymore. Your daughter is gone.\"</em>"},{icon:"star",text:"Jesus heard it. He looked at Jairus. And He said: <em>\"Don't be afraid. Just believe.\"</em>"},{icon:"walk",text:"They kept going."},{icon:"heart",text:"When they got to the house, people were crying and wailing. Jesus said, <em>\"Why all this sadness? She isn't dead — she's only sleeping.\"</em>"},{icon:"star",text:"People laughed at Him. But Jesus went inside. He went to the little girl. He took her hand."},{icon:"gold",text:"<strong>\"Little girl, I say to you, get up.\"</strong>"},{icon:"heart",text:"And she did. Immediately. She stood up and started walking around. Everyone was completely astonished."},{icon:"star",text:"Jesus is not afraid of anything, Avynn — not even the very worst things. <strong>He can always say \"get up\" and make it so.</strong>"}], sayIt:"Jesus is not afraid of anything — He makes a way every time!", prayer:"Jesus, You weren't afraid even when everyone else gave up. Thank You that nothing is too hard for You. When things feel hopeless, remind me that You can always say 'get up.' Amen." },
      { night:"Night 4", title:"Jesus Feeds Five Thousand", ref:"John 6", verse:{text:"Gather the leftovers so that nothing is wasted.",cite:"John 6:12 · CSB"}, color:"#0A1400", accentColor:"#88DD44", headerType:"loaves", lines:[{icon:"people",text:"A huge crowd had followed Jesus out to a hillside to hear Him teach. Five thousand people — at least."},{icon:"heart",text:"It got late. The disciples were worried. <em>\"These people are hungry and there's nowhere to buy food out here.\"</em>"},{icon:"star",text:"Jesus looked at His disciples. <em>\"You give them something to eat,\"</em> He said."},{icon:"people",text:"<em>\"Us?! We don't have nearly enough money for that.\"</em>"},{icon:"bread",text:"But a little boy in the crowd had his lunch: <strong>five small loaves of bread and two little fish.</strong> That was all."},{icon:"heart",text:"The little boy gave Jesus everything he had. He didn't hold back. He just handed it over."},{icon:"gold",text:"Jesus took the food. He looked up to heaven. He gave thanks. And He started breaking it apart and handing it out."},{icon:"bread",text:"<strong>Everyone ate.</strong> Every single person. Five thousand people — and they ate until they were full."},{icon:"heart",text:"Twelve baskets of leftovers. From five loaves and two fish. <em>Twelve full baskets left over.</em>"},{icon:"star",text:"When you give Jesus what you have — even if it seems small — <strong>He makes it more than enough.</strong>"}], sayIt:"When I give Jesus what I have, He makes it more than enough!", prayer:"Jesus, a little boy gave You his small lunch and You fed thousands of people. Help me always give You what I have and trust You to do amazing things with it. Amen." },
      { night:"Night 5", title:"Jesus Walks on Water", ref:"Matthew 14", verse:{text:"Take courage! It is I. Don't be afraid.",cite:"Matthew 14:27 · CSB"}, color:"#000A18", accentColor:"#2288FF", headerType:"water_walk", lines:[{icon:"water",text:"Jesus sent His disciples ahead in a boat while He went up the mountain alone to pray."},{icon:"wind",text:"In the middle of the night, a huge storm blew in. Waves pounding. Wind howling. The disciples were fighting to keep the boat afloat."},{icon:"light",text:"Then they saw something — <em>a figure, walking on top of the water toward them.</em>"},{icon:"fear",text:"<strong>They screamed.</strong> <em>\"It's a ghost!\"</em>"},{icon:"heart",text:"But then they heard a voice — <em>\"Take courage! It is I. Don't be afraid.\"</em>"},{icon:"star",text:"<strong>Peter</strong> — the boldest of the disciples — said: <em>\"Lord, if it's You, tell me to come to You on the water.\"</em>"},{icon:"gold",text:"Jesus said: <em>\"Come.\"</em> And Peter got out of the boat."},{icon:"water",text:"Peter walked on the water. <em>Actually walked on it.</em> Toward Jesus. For a moment, it worked."},{icon:"fear",text:"Then Peter looked at the waves. He felt the wind. He got scared. And he started to sink."},{icon:"heart",text:"<em>\"Lord, save me!\"</em> he cried. And immediately Jesus grabbed his hand. <strong>\"Why did you doubt?\"</strong> Avynn — keep your eyes on Jesus, not the waves."}], sayIt:"Eyes on Jesus — not on the waves!", prayer:"Jesus, Peter walked on water until he looked at the storm instead of You. Help me keep my eyes on You — especially when the waves feel scary. You're right there. Amen." },

    theme:"The greatest story ever told — love wins",
    stories:[
      { night:"Night 1", title:"The Last Supper", ref:"Matthew 26", verse:{text:"This is my body, which is given for you. Do this in remembrance of me.",cite:"Luke 22:19 · CSB"}, color:"#100A00", accentColor:"#CC8822", headerType:"supper", lines:[{icon:"heart",text:"It was the night before everything would change. Jesus gathered His twelve closest friends for one last meal."},{icon:"people",text:"They sat together around the table. Bread. Wine. The smell of food. Friends."},{icon:"heart",text:"Jesus knew what was coming. <em>He knew.</em> And He still chose to stay."},{icon:"bread",text:"He took the bread. Broke it. Looked at His friends. <em>\"This is My body — given for you. Every time you eat together, remember Me.\"</em>"},{icon:"water",text:"He took the cup of wine. <em>\"This is My blood — poured out for many, for the forgiveness of sins.\"</em>"},{icon:"heart",text:"They sang a song together. Then they walked out into the night."},{icon:"star",text:"Jesus knew Judas would betray Him. He knew Peter would deny Him. He knew His disciples would run away."},{icon:"heart",text:"<strong>And He loved them anyway.</strong> Completely. To the end."},{icon:"gold",text:"That's the kind of love Jesus has for you, Avynn — He knows everything about you. And <em>He loves you anyway.</em>"},{icon:"star",text:"Every time we take communion, we remember: <strong>He gave everything for us. Willingly. For love.</strong>"}], sayIt:"Jesus gave everything for me — because He loves me completely!", prayer:"Jesus, You knew what was coming and You chose to go through with it — for me. Thank You. Help me never forget what that meal meant. You love me all the way. Amen." },
      { night:"Night 2", title:"The Garden of Gethsemane", ref:"Luke 22", verse:{text:"Not my will, but yours, be done.",cite:"Luke 22:42 · CSB"}, color:"#080A10", accentColor:"#6666AA", headerType:"garden", lines:[{icon:"walk",text:"After the supper, Jesus walked with His disciples to a garden called Gethsemane."},{icon:"heart",text:"He left most of them near the entrance. He took Peter and James and John a little further in."},{icon:"heart",text:"Then He went a little further alone. And He knelt down. And He prayed."},{icon:"star",text:"<em>\"Father — if it's possible, let this cup pass from Me.\"</em> Jesus was in real pain. Real sorrow."},{icon:"heart",text:"This was the moment. The full weight of every sin ever committed — His to carry. He felt it."},{icon:"gold",text:"But then — the most important words: <em>\"Not My will, but Yours, be done.\"</em>"},{icon:"light",text:"An angel came from heaven and strengthened Him. God sent help."},{icon:"star",text:"Jesus prayed so hard that His sweat became like drops of blood. That's how heavy it was."},{icon:"heart",text:"When Judas came with soldiers to arrest Him, Jesus didn't run. He stood up and walked toward them."},{icon:"gold",text:"He had already said yes. <strong>\"Not My will — Yours.\"</strong> That surrender changed the whole world."}], sayIt:"'Not my will — Yours.' Jesus prayed it for me!", prayer:"Jesus, You were in so much pain in that garden. And You still chose God's will over Your own. Help me learn to pray 'not my will — Yours' even when it's hard. Amen." },
      { night:"Night 3", title:"The Cross", ref:"John 19", verse:{text:"It is finished.",cite:"John 19:30 · CSB"}, color:"#0A0000", accentColor:"#AA2222", headerType:"cross", lines:[{icon:"heart",text:"This is the hardest part of the story — and the most important part."},{icon:"heart",text:"Jesus was put on a cross. He was hurt. He suffered. And He didn't deserve any of it."},{icon:"star",text:"He did it for us. For every wrong thing you and I have ever done or will ever do — <em>He took all of it.</em>"},{icon:"heart",text:"Even hanging on the cross, He prayed: <em>\"Father, forgive them — they don't know what they're doing.\"</em>"},{icon:"light",text:"The sky went dark in the middle of the day. The earth shook. The curtain in the temple tore in two."},{icon:"heart",text:"The curtain that had always kept people far from God — <strong>torn in half.</strong> Now anyone could come close."},{icon:"star",text:"A soldier who had been watching said: <em>\"This man really was the Son of God.\"</em>"},{icon:"gold",text:"And then Jesus said three words that changed all of history:"},{icon:"star",text:"<strong>\"It is finished.\"</strong>"},{icon:"heart",text:"The debt was paid. The price was covered. Nothing more needed to be done. <em>He did it all — for love of you, Avynn.</em>"}], sayIt:"It is finished — Jesus paid it all for me!", prayer:"Jesus, I can't fully understand what the cross cost You. But I know You did it for love. Thank You. I am so grateful. Help me never take that for granted. Amen." },
      { night:"Night 4", title:"The Empty Tomb", ref:"John 20", verse:{text:"He is not here, for he has risen, just as he said.",cite:"Matthew 28:6 · CSB"}, color:"#080A00", accentColor:"#FFEE44", headerType:"tomb", lines:[{icon:"heart",text:"The disciples were devastated. Jesus — their teacher, their friend, the one they had given everything for — was gone."},{icon:"star",text:"Early on Sunday morning, while it was still dark, Mary Magdalene went to the tomb."},{icon:"stone",text:"She got there and saw something that stopped her cold — the stone was rolled away. The tomb was open."},{icon:"fear",text:"She ran to get Peter and John. They ran back to the tomb. They looked inside."},{icon:"light",text:"The cloth that had been wrapped around Jesus — it was there. Neatly folded. But <strong>Jesus wasn't.</strong>"},{icon:"heart",text:"Mary stood outside the tomb crying. She looked inside and saw <strong>two angels.</strong>"},{icon:"star",text:"<em>\"Why are you crying?\"</em> they asked. She turned around — and there was someone standing behind her."},{icon:"heart",text:"She thought it was the gardener. Then He said her name: <em>\"Mary.\"</em>"},{icon:"gold",text:"<strong>She knew that voice.</strong> She spun around. <em>\"Rabboni!\"</em> — My Teacher. <em>Jesus was alive.</em>"},{icon:"star",text:"He is not here — <strong>He is risen.</strong> And because He rose, Avynn, you get to live forever too."}], sayIt:"He is risen — and because He lives, I live too!", prayer:"Jesus, You beat death. You actually beat it. You rose from the grave and walked back out. Thank You. Because You live, I don't have to be afraid of anything. Amen." },
      { night:"Night 5", title:"Jesus Goes Back to Heaven", ref:"Acts 1", verse:{text:"You will receive power when the Holy Spirit has come on you.",cite:"Acts 1:8 · CSB"}, color:"#060A18", accentColor:"#88AAFF", headerType:"ascension", lines:[{icon:"heart",text:"After Jesus rose from the dead, He spent forty days with His disciples. Talking. Teaching. Eating with them."},{icon:"people",text:"He appeared to hundreds of people. He wanted them — and us — to be absolutely sure: <strong>He was alive.</strong>"},{icon:"walk",text:"Then the day came. He led them to a hillside outside Jerusalem."},{icon:"heart",text:"He told them: <em>\"Go and tell everyone — in Jerusalem, in the whole world — everything you have seen and heard.\"</em>"},{icon:"star",text:"<em>\"You won't be alone,\"</em> He promised. <em>\"The Holy Spirit will come and give you power.\"</em>"},{icon:"light",text:"And then — right in front of them — He was lifted up. Higher and higher. Into the clouds."},{icon:"star",text:"They stood there staring at the sky. Then two angels appeared: <em>\"Why are you standing here looking up? He will come back the same way you saw Him leave.\"</em>"},{icon:"heart",text:"He wasn't gone forever. He was going to prepare a place for them. For <em>us.</em>"},{icon:"gold",text:"And He sent the Holy Spirit to live <strong>inside</strong> every person who loves Him. Including you, Avynn."},{icon:"star",text:"Jesus is coming back. Until then — <strong>you carry Him everywhere you go.</strong>"}], sayIt:"Jesus lives in me — I carry Him everywhere I go!", prayer:"Jesus, thank You for sending the Holy Spirit to live inside me. I'm never alone. Help me remember that I carry You with me everywhere I go — and let that make me brave. Amen." },
    ]
  },
  {
    name:"The Early Church",
    theme:"The Holy Spirit shows up and changes everything",
    stories:[
      { night:"Night 1", title:"Pentecost — Fire Falls", ref:"Acts 2", verse:{text:"They were all filled with the Holy Spirit.",cite:"Acts 2:4 · CSB"}, color:"#1A0800", accentColor:"#FF6600", headerType:"pentecost", lines:[{icon:"people",text:"The disciples were gathered together in one place, praying and waiting — just as Jesus had told them."},{icon:"wind",text:"Suddenly — a sound like a <strong>violent rushing wind</strong> filled the whole house."},{icon:"fire",text:"And then — <em>fire.</em> Tongues of fire that split apart and rested on each person."},{icon:"gold",text:"<strong>Every single one of them was filled with the Holy Spirit.</strong>"},{icon:"people",text:"They went outside and started speaking — in languages they had never learned. People from all over the world could hear them."},{icon:"heart",text:"<em>\"How is this possible?\"</em> the crowd asked. <em>\"These are simple Galilean people — how can they speak our language?\"</em>"},{icon:"star",text:"Peter stood up and preached. The man who had denied Jesus three times — <strong>stood up and preached.</strong>"},{icon:"heart",text:"Three thousand people believed in Jesus that day. Three thousand. In one afternoon."},{icon:"fire",text:"That same Holy Spirit lives in you, Avynn. Not smaller. Not weaker. <em>The same one.</em>"},{icon:"gold",text:"<strong>The fire that fell on Pentecost — that's the same fire in your heart.</strong>"}], sayIt:"The same Holy Spirit lives in me — the same fire!", prayer:"Holy Spirit, thank You for coming. Thank You that You didn't stay far away — You came to live inside us. Fill me up today. I want all of You. Amen." },
      { night:"Night 2", title:"Peter and John Heal a Beggar", ref:"Acts 3", verse:{text:"Silver or gold I do not have, but what I do have I give you.",cite:"Acts 3:6 · CSB"}, color:"#080A08", accentColor:"#44BB44", headerType:"healing", lines:[{icon:"walk",text:"Peter and John were heading to the temple to pray. A man was sitting at the gate — the same spot every day."},{icon:"heart",text:"He had never walked. Not once in his life. He sat and asked for money from people passing by."},{icon:"heart",text:"He saw Peter and John and held out his hand for a coin. Peter stopped and looked at him."},{icon:"star",text:"<em>\"Look at us,\"</em> Peter said. The man looked up, expecting money."},{icon:"gold",text:"<em>\"Silver or gold I don't have. But what I do have — I give you.\"</em>"},{icon:"light",text:"<em>\"In the name of Jesus Christ of Nazareth — <strong>walk.</strong>\"</em>"},{icon:"heart",text:"Peter took his hand and pulled him up. And <em>immediately</em> his feet and ankles became strong."},{icon:"walk",text:"The man leaped to his feet. He started <strong>walking and jumping</strong> and praising God right there in the temple."},{icon:"people",text:"Everyone who saw him knew this was the man who sat begging at the gate. They were absolutely amazed."},{icon:"star",text:"Peter had something better than money. He had Jesus. <strong>And Jesus is still the best thing anyone can give.</strong>"}], sayIt:"I have Jesus to give — and that's better than anything!", prayer:"God, Peter had something better than money to give. Help me remember that I carry Jesus — and that's the greatest gift I can offer anyone. Amen." },
      { night:"Night 3", title:"Paul Meets Jesus on the Road", ref:"Acts 9", verse:{text:"Why are you persecuting me?",cite:"Acts 9:4 · CSB"}, color:"#100A00", accentColor:"#FFAA33", headerType:"paul", lines:[{icon:"star",text:"There was a man named Saul who hated Christians. He hunted them down. He was proud of it."},{icon:"walk",text:"He was on his way to a city called Damascus to arrest more believers — when something stopped him cold."},{icon:"light",text:"A <strong>blinding light from heaven</strong> flashed all around him. He fell to the ground."},{icon:"heart",text:"A voice spoke: <em>\"Saul, Saul — why are you persecuting Me?\"</em>"},{icon:"fear",text:"<em>\"Who are You, Lord?\"</em> Saul asked, trembling."},{icon:"gold",text:"<em>\"I am Jesus — the one you are persecuting.\"</em>"},{icon:"star",text:"Saul was blinded. His companions led him into the city. He didn't eat or drink for three days."},{icon:"heart",text:"God sent a believer named Ananias to pray for him. When Ananias put his hands on Saul — <strong>his sight came back.</strong>"},{icon:"star",text:"Saul was baptized. And the man who had hunted Christians became the greatest missionary who ever lived."},{icon:"gold",text:"His name became <strong>Paul.</strong> Nobody is too far from Jesus. <em>Nobody.</em>"}], sayIt:"Nobody is too far from Jesus — He can reach anyone!", prayer:"Jesus, You stopped Saul right in the middle of his worst choices and turned him into someone amazing. You can do that for anyone. Thank You that You never give up on people. Amen." },
      { night:"Night 4", title:"Paul and Silas in Prison", ref:"Acts 16", verse:{text:"Suddenly there was a violent earthquake.",cite:"Acts 16:26 · CSB"}, color:"#080808", accentColor:"#FFCC00", headerType:"prison", lines:[{icon:"heart",text:"Paul and his friend Silas were thrown in prison — just for telling people about Jesus."},{icon:"star",text:"They were put in the deepest, darkest cell. Their feet were locked in chains."},{icon:"horn",text:"It was midnight. And do you know what they did? <strong>They sang.</strong>"},{icon:"heart",text:"Praying and singing praises to God — <em>in prison, in the dark, in chains.</em>"},{icon:"gold",text:"The other prisoners were listening. <em>They were listening.</em>"},{icon:"star",text:"Then — suddenly — a violent earthquake. The whole prison shook."},{icon:"heart",text:"Every door flew open. Every chain fell off."},{icon:"fear",text:"The guard woke up terrified. He thought everyone had escaped. He was about to hurt himself."},{icon:"star",text:"<em>\"Don't do it!\"</em> Paul shouted. <em>\"We're all still here!\"</em>"},{icon:"gold",text:"The guard fell trembling before them. <em>\"What must I do to be saved?\"</em> He and his whole family believed that night. <strong>Worship in the dark — and God shakes things loose.</strong>"}], sayIt:"I can worship even in the dark — and God will shake things loose!", prayer:"God, Paul and Silas worshiped in chains. Help me worship You even when things are hard — even in my hard moments. You hear every song. Amen." },
      { night:"Night 5", title:"John Sees Heaven", ref:"Revelation 21", verse:{text:"He will wipe away every tear from their eyes.",cite:"Revelation 21:4 · CSB"}, color:"#060A18", accentColor:"#AACCFF", headerType:"heaven", lines:[{icon:"star",text:"John was an old man, alone on an island — when God gave him the most incredible vision anyone has ever seen."},{icon:"light",text:"He saw heaven. The New Jerusalem, coming down from God — <strong>brilliant as a precious jewel, gleaming like crystal.</strong>"},{icon:"gold",text:"Streets of gold. Gates of pearl. A river of the water of life, clear as crystal."},{icon:"heart",text:"No more crying. No more pain. No more death."},{icon:"gold",text:"<strong>\"He will wipe away every tear from their eyes.\"</strong>"},{icon:"star",text:"God Himself will live with His people — face to face. <em>No more separation.</em>"},{icon:"heart",text:"The sun won't even be needed there — because <strong>the glory of God will light up everything.</strong>"},{icon:"star",text:"John wrote it all down so that we would know — this is where the story ends. This is what we're heading toward."},{icon:"heart",text:"Every hard night, every sad moment, every scary thing — they are <em>temporary.</em>"},{icon:"gold",text:"What's permanent is this: <strong>Heaven. God. Together. Forever.</strong> That's what's waiting for you, Avynn."}], sayIt:"Heaven is waiting — the best part of the story is still coming!", prayer:"God, thank You that this world isn't the end of the story. Thank You that heaven is real and You'll wipe every tear away. Help me hold onto that when things get hard. Amen." },
    ]
  },
  {
    name:"God's Character",
    theme:"Who God is — and what that means for Avynn",
    stories:[
      { night:"Night 1", title:"God Is Always With You", ref:"Psalm 139", verse:{text:"Where can I flee from your presence?",cite:"Psalm 139:7 · CSB"}, color:"#080A18", accentColor:"#6688FF", headerType:"omnipresent", lines:[{icon:"star",text:"David wrote this psalm — and he was amazed by one thing above everything else: <em>God is always there.</em>"},{icon:"heart",text:"<em>\"Where can I go from Your Spirit? Where can I flee from Your presence?\"</em>"},{icon:"star",text:"If I go up to heaven — <strong>You are there.</strong>"},{icon:"star",text:"If I go to the deepest sea — <strong>You are there.</strong>"},{icon:"light",text:"If I fly to the far edge of the morning — <strong>Your hand is there to guide me.</strong>"},{icon:"heart",text:"Even in the dark — the dark is not dark to God. <em>Night and day are the same to Him.</em>"},{icon:"gold",text:"God knew you before you were born, Avynn. He saw you being formed. <strong>He counted every part of you.</strong>"},{icon:"heart",text:"He knows when you sit down and when you stand up. He knows every thought before you think it."},{icon:"star",text:"This is not scary — <em>this is the most comforting thing in the world.</em>"},{icon:"gold",text:"<strong>You are never alone. Not for a single second.</strong> God is always right there with you."}], sayIt:"I am never alone — God is always right here with me!", prayer:"God, You know everything about me — every thought, every fear, every secret. And You love me anyway. Thank You that I can never go somewhere You're not. Amen." },
      { night:"Night 2", title:"God Is Our Shepherd", ref:"Psalm 23", verse:{text:"The Lord is my shepherd; I have what I need.",cite:"Psalm 23:1 · CSB"}, color:"#080A00", accentColor:"#88CC44", headerType:"shepherd", lines:[{icon:"heart",text:"David was a shepherd boy before he became a king. He knew what a shepherd does."},{icon:"sheep",text:"A shepherd leads his sheep to green grass and still water. <em>He takes care of every need.</em>"},{icon:"heart",text:"David said: <em>\"The Lord is my shepherd.\"</em> That means God is taking care of <strong>me</strong> like that."},{icon:"water",text:"<em>\"He lets me lie down in green pastures. He leads me beside quiet waters. He gives my soul rest.\"</em>"},{icon:"walk",text:"Even when I walk through the darkest valley — <strong>I don't have to be afraid.</strong> He's right there with me."},{icon:"star",text:"The shepherd carries a staff — to guide the sheep and protect them from danger."},{icon:"heart",text:"God prepares a table for me — <em>even when enemies are watching.</em> He sets a feast and invites me to sit."},{icon:"gold",text:"He pours blessing on my head. <em>My cup overflows.</em>"},{icon:"star",text:"<em>\"Surely goodness and faithful love will follow me all the days of my life.\"</em>"},{icon:"heart",text:"Not sometimes. Not when you deserve it. <strong>All. The. Days.</strong> That's your God, Avynn."}], sayIt:"The Lord is my shepherd — I have everything I need!", prayer:"God, You are my shepherd. You lead me to good places and take care of me. Help me follow You the way sheep follow their shepherd — trusting You completely. Amen." },
      { night:"Night 3", title:"God Hears Every Prayer", ref:"1 Kings 18", verse:{text:"Answer me, Lord! Answer me.",cite:"1 Kings 18:37 · CSB"}, color:"#100800", accentColor:"#FF8800", headerType:"elijah", lines:[{icon:"heart",text:"There was a prophet named Elijah who stood alone against 450 false prophets on a mountain."},{icon:"fire",text:"It was a contest: whose God would send fire down from heaven to light an altar?"},{icon:"star",text:"The false prophets went first. They danced around their altar for hours. They shouted. They cut themselves. <strong>Nothing happened.</strong>"},{icon:"heart",text:"Then Elijah rebuilt the altar of God. He soaked it with water — not once, not twice, but three times. Soaking wet."},{icon:"star",text:"He dug a trench around it and filled that with water too. <em>He wanted to make it obvious it couldn't be faked.</em>"},{icon:"heart",text:"Then Elijah prayed. One prayer. Simple. Confident. <em>\"Lord, answer me so these people will know that You are God.\"</em>"},{icon:"fire",text:"<strong>Fire fell from heaven.</strong> It burned up the sacrifice. The wood. The stones. The water in the trench. Everything."},{icon:"heart",text:"The people fell on their faces. <em>\"The Lord — He is God! The Lord — He is God!\"</em>"},{icon:"gold",text:"Elijah didn't need fancy words. He didn't need a long prayer. He just <strong>talked to God. And God answered.</strong>"},{icon:"star",text:"You can do that, Avynn. Just talk to Him. <em>He is listening. He will answer.</em>"}], sayIt:"God hears me when I pray — and He always answers!", prayer:"God, Elijah just talked to You and You sent fire from heaven. Help me remember that prayer is just talking to You — and You really do listen and answer. Amen." },
      { night:"Night 4", title:"God's Love Never Ends", ref:"Lamentations 3", verse:{text:"His mercies never end. They are new every morning.",cite:"Lamentations 3:22-23 · CSB"}, color:"#0A080A", accentColor:"#CC88CC", headerType:"mercy", lines:[{icon:"heart",text:"Jeremiah was having one of the worst times of his life. His city was destroyed. His people were broken."},{icon:"star",text:"He sat in the middle of devastation and wrote this:"},{icon:"gold",text:"<em>\"Yet this I call to mind — and therefore I have hope.\"</em>"},{icon:"heart",text:"<em>\"The faithful love of the Lord never ends. His mercies never cease.\"</em>"},{icon:"star",text:"<strong>\"They are new every morning.\"</strong>"},{icon:"heart",text:"Every single morning when you wake up, Avynn — God has <em>fresh mercy</em> ready for you."},{icon:"gold",text:"It's not running out. It's not getting tired. It's not keeping score. <strong>New. Every. Morning.</strong>"},{icon:"star",text:"Bad day yesterday? Fresh mercy today. Made a mistake? Fresh mercy today."},{icon:"heart",text:"<em>\"Great is Your faithfulness,\"</em> Jeremiah wrote — in the middle of the hardest season of his life."},{icon:"gold",text:"If mercy could run out, Jeremiah would have been the one to use it up. It didn't. It won't. <strong>Not ever.</strong>"}], sayIt:"God's mercy is new every morning — today is a fresh start!", prayer:"God, thank You that Your mercy is new every morning. Yesterday doesn't have to follow me into today. Every morning I wake up to a fresh start with You. Thank You. Amen." },
      { night:"Night 5", title:"Nothing Can Separate Us", ref:"Romans 8", verse:{text:"Nothing can separate us from the love of God.",cite:"Romans 8:39 · CSB"}, color:"#060A10", accentColor:"#4488FF", headerType:"love", lines:[{icon:"heart",text:"Paul wanted to make absolutely sure — no question, no doubt, no wondering."},{icon:"star",text:"So he made a list. Every scary, hard thing he could think of."},{icon:"heart",text:"<em>Can trouble separate us from the love of God?</em> <strong>No.</strong>"},{icon:"heart",text:"<em>Can hardship? Danger? Death?</em> <strong>No. No. No.</strong>"},{icon:"star",text:"He said: <em>\"In all these things we are more than conquerors through Him who loved us.\"</em>"},{icon:"gold",text:"<strong>More than conquerors.</strong> Not barely surviving — <em>more than winning.</em>"},{icon:"heart",text:"And then Paul went even bigger — death, life, angels, rulers, things present, things to come, height, depth —"},{icon:"gold",text:"<strong>\"Nothing in all creation can separate us from the love of God that is in Christ Jesus.\"</strong>"},{icon:"heart",text:"That list covers everything. <em>Everything.</em> He thought of every possible thing — and said none of it can do it."},{icon:"star",text:"You are <strong>held</strong>, Avynn. Not by your behavior. Not by your feelings. By a love that cannot be broken. <em>Not ever.</em>"}], sayIt:"Nothing can separate me from God's love — nothing!", prayer:"God, thank You that Your love isn't something I can lose. It holds me even when I mess up, even when I'm scared, even when I don't feel it. That love is real. Amen." },
    ]
  },
  {
    name:"Proverbs for Life",
    theme:"God's wisdom for the everyday",
    stories:[
      { night:"Night 1", title:"Trust God With Everything", ref:"Proverbs 3:5-6", verse:{text:"Trust in the Lord with all your heart.",cite:"Proverbs 3:5 · CSB"}, color:"#080A10", accentColor:"#88AAFF", headerType:"trust", lines:[{icon:"heart",text:"Solomon was the wisest person who ever lived. And the wisest thing he ever wrote is this:"},{icon:"gold",text:"<em>\"Trust in the Lord with <strong>all</strong> your heart.\"</em>"},{icon:"star",text:"Not some of it. Not the parts you're not using. <em>All of it.</em>"},{icon:"heart",text:"<em>\"And do not rely on your own understanding.\"</em>"},{icon:"star",text:"This means: sometimes you won't understand why something is happening. <strong>Trust anyway.</strong>"},{icon:"heart",text:"<em>\"In all your ways know Him.\"</em> In every decision. In every moment. Keep God in view."},{icon:"gold",text:"<em>\"And He will make your paths straight.\"</em>"},{icon:"star",text:"Not necessarily easy. <strong>Straight.</strong> Going somewhere good. Going where He wants you."},{icon:"heart",text:"The Hebrew word for 'trust' here means to lean your whole weight on something — like leaning on a strong wall."},{icon:"gold",text:"Lean your <em>whole weight</em> on God, Avynn. He is strong enough. <strong>He has never dropped anyone yet.</strong>"}], sayIt:"I trust God with all my heart — He will make my path straight!", prayer:"God, help me trust You with all my heart — even the parts I'm scared to give You. I don't have to understand everything. I just have to trust You. Amen." },
      { night:"Night 2", title:"Kind Words Are a Gift", ref:"Proverbs 16:24", verse:{text:"Pleasant words are a honeycomb: sweet to the taste and health to the body.",cite:"Proverbs 16:24 · CSB"}, color:"#0A0800", accentColor:"#FFCC22", headerType:"words", lines:[{icon:"heart",text:"Solomon said that kind words are like honeycomb — <em>sweet and healing.</em>"},{icon:"gold",text:"Think about the last time someone said something really kind to you. How did it feel?"},{icon:"heart",text:"It probably felt warm. Safe. Like something inside you relaxed a little."},{icon:"star",text:"<strong>Words have power.</strong> They can hurt — or they can heal. Every single time you speak, you're choosing."},{icon:"heart",text:"A kind word to a sad friend is like medicine. It doesn't fix everything — but it <em>helps.</em>"},{icon:"gold",text:"God made words powerful on purpose. He spoke the whole world into existence with words."},{icon:"star",text:"When you speak kindly, you're doing something <em>God-like.</em> You're creating something good."},{icon:"heart",text:"Think before you speak, sweet girl. Ask: <em>\"Is this going to be honey — or is this going to sting?\"</em>"},{icon:"star",text:"You get to choose. Every time."},{icon:"gold",text:"<strong>Let your words be honeycomb, Avynn. The world needs more of that.</strong>"}], sayIt:"My words are powerful — I choose to make them sweet!", prayer:"God, help me think before I speak. Help me use my words to heal and encourage, not to hurt. Let my words be like honey — sweet and good. Amen." },
      { night:"Night 3", title:"Work Hard at Everything", ref:"Proverbs 31 & Colossians 3", verse:{text:"Whatever you do, do it from the heart, as something done for the Lord.",cite:"Colossians 3:23 · CSB"}, color:"#0A0A00", accentColor:"#CCAA33", headerType:"work", lines:[{icon:"heart",text:"There's a woman at the end of Proverbs who is described as someone who works incredibly hard."},{icon:"star",text:"She gets up before the sun. She takes care of her family. She plants fields. She runs a business."},{icon:"gold",text:"And she does all of it <em>with strength and dignity.</em>"},{icon:"heart",text:"She's not tired and grumpy. She's <strong>laughing at the future</strong> — because she's prepared."},{icon:"star",text:"Paul added to this: <em>\"Whatever you do — do it from the heart, as something done for the Lord.\"</em>"},{icon:"heart",text:"Cleaning your room. Doing schoolwork. Being kind to a sibling. <em>All of it — for God.</em>"},{icon:"gold",text:"Work is worship when your heart is right."},{icon:"star",text:"You don't have to do big, famous things to honor God, Avynn."},{icon:"heart",text:"You can honor Him by doing <em>small things really, really well.</em>"},{icon:"gold",text:"<strong>Work hard. Do it for God. He sees every bit of it — and He is so pleased.</strong>"}], sayIt:"I work hard as worship to God — He sees everything I do!", prayer:"God, help me work hard at everything — not to impress people, but for You. Help me remember that even small things done for You are big things. Amen." },
      { night:"Night 4", title:"Real Friends Make You Better", ref:"Proverbs 27:17", verse:{text:"Iron sharpens iron, and one person sharpens another.",cite:"Proverbs 27:17 · CSB"}, color:"#080A08", accentColor:"#44BB88", headerType:"friends", lines:[{icon:"heart",text:"Solomon said that friends are like iron sharpening iron — they make each other <em>better.</em>"},{icon:"star",text:"When two pieces of iron rub together, they create sparks. It's not always comfortable. But the edges get sharper."},{icon:"heart",text:"A real friend isn't just someone who makes you feel good all the time."},{icon:"gold",text:"A real friend tells you the truth — even when it's hard to hear."},{icon:"heart",text:"A real friend helps you become a <em>better</em> version of yourself."},{icon:"star",text:"And a real friend is someone <em>you</em> sharpen too. Someone you help grow."},{icon:"heart",text:"Choose your friends carefully, sweet girl. You become like the people you spend the most time with."},{icon:"gold",text:"Spend time with people who love God. People who are kind and honest and brave."},{icon:"star",text:"And <strong>be that kind of friend to others.</strong> Be iron that sharpens."},{icon:"heart",text:"The best friendships point both people <strong>toward Jesus.</strong> That's the kind worth having."}], sayIt:"I choose friends who make me better — and I make them better too!", prayer:"God, help me choose good friends. Help me be a good friend. Help me be the kind of person who makes the people around me sharper and stronger. Amen." },
      { night:"Night 5", title:"Guard Your Heart", ref:"Proverbs 4:23", verse:{text:"Guard your heart above all else, for it is the source of life.",cite:"Proverbs 4:23 · CSB"}, color:"#0A0808", accentColor:"#FF6688", headerType:"heart", lines:[{icon:"heart",text:"Solomon said the most important thing you can protect is <em>your heart.</em>"},{icon:"star",text:"Not your stuff. Not your reputation. <strong>Your heart.</strong>"},{icon:"heart",text:"Because everything that comes out of you — every word, every choice, every action — <em>flows from your heart.</em>"},{icon:"gold",text:"If your heart is full of good things — love, trust, gratitude, faith — <em>good things will come out.</em>"},{icon:"heart",text:"If your heart is full of bitterness, anger, fear — <em>those things will come out instead.</em>"},{icon:"star",text:"Guarding your heart means being careful about what you let inside. What you watch. What you listen to. What you think about."},{icon:"heart",text:"It means choosing to think about things that are true and beautiful and good — like Paul said in Philippians 4."},{icon:"gold",text:"It means going to God when something is hurting your heart — <em>before it takes root.</em>"},{icon:"star",text:"Your heart is valuable, Avynn. <strong>Protect it like a treasure.</strong>"},{icon:"heart",text:"Fill it with God's Word. Fill it with worship. Fill it with love. <em>What goes in will always come out.</em>"}], sayIt:"I guard my heart — because my heart is where life comes from!", prayer:"God, help me guard my heart. Help me be careful about what I let in. Fill my heart with Your Word and Your love — so that good things come out of me. Amen." },

  {
    name:"The King Is Coming",
    theme:"The story isn't over — the best is yet to come",
    stories:[
      { night:"Night 1", title:"Heaven Is a Real Place", ref:"John 14 & Revelation 21", verse:{text:"I go to prepare a place for you.",cite:"John 14:2 · CSB"}, color:"#060A18", accentColor:"#AABBFF", headerType:"heaven2", lines:[{icon:"heart",text:"On the night before He died, Jesus told His disciples something wonderful: <em>\"Don't let your hearts be troubled.\"</em>"},{icon:"star",text:"<em>\"My Father's house has many rooms. I am going to prepare a place for you.\"</em>"},{icon:"heart",text:"He said <em>prepare.</em> Like He's setting up a room. Picking it out. Making it perfect. <strong>For you, Avynn. Specifically.</strong>"},{icon:"gold",text:"John caught a glimpse of it in Revelation — streets of gold, gates of pearl, a river of life, no more tears."},{icon:"heart",text:"<em>\"God Himself will be with them. He will wipe every tear from their eyes.\"</em>"},{icon:"star",text:"No more sad days. No more bad dreams. No more hurting."},{icon:"gold",text:"<strong>Just God. And love. And home. Forever.</strong>"},{icon:"heart",text:"This is real. Jesus said so. And He doesn't say things that aren't true."},{icon:"star",text:"Everything hard here is <em>temporary.</em> Everything good there is <em>permanent.</em>"},{icon:"heart",text:"Your whole life here is like the cover of the book, Avynn. <strong>The story inside is still to come.</strong>"}], sayIt:"Jesus is preparing a place for me — heaven is real and I'm going!", prayer:"Jesus, thank You that heaven is real. Thank You that You are getting it ready for me. Help me live here knowing that the very best is still coming. Amen." },
      { night:"Night 2", title:"The Armor of God", ref:"Ephesians 6", verse:{text:"Put on the full armor of God.",cite:"Ephesians 6:11 · CSB"}, color:"#080A10", accentColor:"#8888FF", headerType:"armor", lines:[{icon:"star",text:"Paul told us something important: we are in a battle. Not against people — against the real enemy of our souls."},{icon:"heart",text:"And God hasn't left us unarmed. He has <em>full armor</em> for us."},{icon:"gold",text:"The <strong>Belt of Truth</strong> — truth holds everything together. Know what's true about God and about yourself."},{icon:"star",text:"The <strong>Breastplate of Righteousness</strong> — doing what's right protects your heart."},{icon:"walk",text:"<strong>Shoes of Peace</strong> — you are ready to go wherever God sends you, bringing peace."},{icon:"shield",text:"The <strong>Shield of Faith</strong> — it blocks the enemy's attacks. Every doubt, every fear — faith deflects it."},{icon:"crown",text:"The <strong>Helmet of Salvation</strong> — you know who you are and whose you are. Nobody can take that from you."},{icon:"star",text:"The <strong>Sword of the Spirit</strong> — God's Word. The one offensive weapon. Speak Scripture when the enemy attacks."},{icon:"heart",text:"And underneath all of it: <strong>prayer.</strong> Stay connected to God at all times."},{icon:"gold",text:"You are a warrior, Avynn. <em>Put your armor on every morning.</em> God has already won the war."}], sayIt:"I put on God's armor every day — I am a warrior!", prayer:"God, help me remember to put on my armor every morning. I want to be ready. I know You've already won — help me live like someone who knows that. Amen." },
      { night:"Night 3", title:"Jesus Is Coming Back", ref:"Revelation 22", verse:{text:"Yes, I am coming soon.",cite:"Revelation 22:20 · CSB"}, color:"#060A18", accentColor:"#FFD700", headerType:"return", lines:[{icon:"star",text:"The very last pages of the Bible are a promise — the last words Jesus says are:"},{icon:"gold",text:"<strong>\"Yes, I am coming soon.\"</strong>"},{icon:"heart",text:"He said it. He meant it. And one day — it will happen."},{icon:"star",text:"Jesus will come back. Not secretly. <em>Visibly. Gloriously.</em> Every eye will see."},{icon:"heart",text:"The Bible says it will be like lightning flashing from east to west — <strong>impossible to miss.</strong>"},{icon:"gold",text:"He's coming for His people. For everyone who belongs to Him."},{icon:"heart",text:"Until that day — we are not killing time. We are not just waiting."},{icon:"star",text:"We are <em>carrying His light</em> into a world that needs it."},{icon:"heart",text:"We are loving people. Telling His story. Doing good. Being His hands and His feet."},{icon:"gold",text:"<strong>\"Come, Lord Jesus.\"</strong> That's the prayer that has been prayed by every believer for two thousand years. And one day — He will."}], sayIt:"Jesus is coming back — and until then I carry His light!", prayer:"Jesus, come back soon. Until You do, help me carry Your light every day. Help me live like someone who is excited for Your return — and ready. Amen." },
      { night:"Night 4", title:"You Are God's Masterpiece", ref:"Ephesians 2:10", verse:{text:"We are his workmanship, created in Christ Jesus for good works.",cite:"Ephesians 2:10 · CSB"}, color:"#080A00", accentColor:"#FFCC44", headerType:"masterpiece", lines:[{icon:"heart",text:"The Greek word Paul uses for 'workmanship' is <em>poiēma.</em> It means <strong>poem. Masterpiece.</strong>"},{icon:"star",text:"<em>You are God's poem.</em> His masterpiece. Written on purpose, with care, with intention."},{icon:"heart",text:"He didn't make you by accident. He didn't slap you together quickly."},{icon:"gold",text:"<strong>He crafted you.</strong> The way you laugh. The way you think. The things that make you, you. All on purpose."},{icon:"heart",text:"And He made you for <em>good works</em> — things He prepared ahead of time for you specifically."},{icon:"star",text:"There are things only <em>you</em> can do. People only you can reach. A unique mark only you can leave."},{icon:"heart",text:"You don't have to earn your place, Avynn. <em>You already have one.</em> God made it for you."},{icon:"gold",text:"You don't have to be someone else. <strong>He made you to be you — specifically and on purpose.</strong>"},{icon:"star",text:"Walk in it. The good works are already prepared. You just have to show up."},{icon:"heart",text:"<em>You are His masterpiece.</em> Read that again. Let it sink all the way in."}], sayIt:"I am God's masterpiece — made on purpose for a purpose!", prayer:"God, help me believe that I am Your masterpiece. Help me stop wishing I were different and start walking in the purpose You made me for. I am Yours. Amen." },
      { night:"Night 5", title:"The Greatest Commandment", ref:"Matthew 22", verse:{text:"Love the Lord your God with all your heart, soul, and mind.",cite:"Matthew 22:37 · CSB"}, color:"#0A0808", accentColor:"#FF6644", headerType:"love2", lines:[{icon:"heart",text:"Someone asked Jesus: <em>\"What is the most important commandment of all?\"</em>"},{icon:"gold",text:"Jesus didn't hesitate. He said: <strong>\"Love the Lord your God with all your heart, with all your soul, and with all your mind.\"</strong>"},{icon:"heart",text:"<em>All</em> your heart. <em>All</em> your soul. <em>All</em> your mind."},{icon:"star",text:"Not the leftover parts. Not the parts you're done using. <em>Everything.</em>"},{icon:"heart",text:"And the second, Jesus said, is like it: <strong>\"Love your neighbor as yourself.\"</strong>"},{icon:"star",text:"Two commands. <em>Every other command hangs on these two.</em>"},{icon:"heart",text:"This is the whole thing, Avynn. This is what all the stories have been pointing to."},{icon:"gold",text:"<em>Love God.</em> First. Most. Everything else flows from that."},{icon:"heart",text:"<em>Love people.</em> The way you already know you want to be loved."},{icon:"gold",text:"<strong>That's it. That's the whole life. Love God. Love people. Go do it.</strong>"}], sayIt:"Love God with everything — love people with everything!", prayer:"God, this is the whole thing — love You, love people. Help me actually do it. Help me love You with all of me — and let that love overflow to everyone around me. Amen." },
    ]
  }
];

/* ═══════════════════════════════════════════════
   RENDER FUNCTIONS
   ═══════════════════════════════════════════════ */
let currentWeek = null;
let currentStory = null;
let currentPanel = 'archive';

function startApp(){
  document.getElementById('cover').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  renderApp();
}

function renderApp(){
  const app = document.getElementById('app');
  app.innerHTML = `
    <nav class="top-nav">
      <button class="tnb ${currentPanel==='archive'?'active':''}" onclick="showPanel('archive')">Story Archive</button>
      <button class="tnb ${currentPanel==='about'?'active':''}" onclick="showPanel('about')">About</button>
    </nav>
    <div class="panel ${currentPanel==='archive'?'active':''}" id="panel-archive">
      ${renderArchive()}
    </div>
    <div class="panel ${currentPanel==='about'?'active':''}" id="panel-about">
      ${renderAbout()}
    </div>
  `;
}

function showPanel(p){
  currentPanel = p;
  currentWeek = null;
  currentStory = null;
  renderApp();
}

function renderArchive(){
  if(currentStory !== null && currentWeek !== null){
    return renderStoryDetail(WEEKS[currentWeek], WEEKS[currentWeek].stories[currentStory], currentWeek, currentStory);
  }
  if(currentWeek !== null){
    return renderWeekDetail(WEEKS[currentWeek], currentWeek);
  }
  return renderWeekList();
}

function renderWeekList(){
  return `
    <div class="archive-intro">
      <div class="sec-title">Eight Weeks of Stories</div>
      <div class="sec-sub">For Avynn · Nightly · Five stories per week</div>
      <p class="body-text">Forty stories. One child. A lifetime of truth planted early. Choose a week to begin tonight.</p>
      <div class="progress-wrap">
        <div class="progress-top"><span>Archive Progress</span><span>0 / 40 stories</span></div>
        <div class="progress-bar"><div class="progress-fill" style="width:0%"></div></div>
      </div>
    </div>
    ${WEEKS.map((w,i) => `
      <div class="week-card" onclick="openWeek(${i})">
        <div class="week-card-num">Week ${i+1}</div>
        <div class="week-card-content">
          <div class="week-card-name">${w.name}</div>
          <div class="week-card-theme">${w.theme}</div>
        </div>
        <div class="week-card-count">${w.stories.length} stories →</div>
      </div>
    `).join('')}
    <div class="seal">
      <p>Train up a child in the way she should go</p>
      <cite>Proverbs 22:6</cite>
    </div>
  `;
}

function openWeek(i){
  currentWeek = i;
  currentStory = null;
  renderApp();
}

function openStory(wi, si){
  currentWeek = wi;
  currentStory = si;
  renderApp();
}

function renderWeekDetail(week, wi){
  return `
    <button class="back-btn" onclick="closeWeek()">← All Weeks</button>
    <div class="sec-title">${week.name}</div>
    <div class="sec-sub">Week ${wi+1} · Five Nights</div>
    <p class="body-text">${week.theme}</p>
    <div class="divider"></div>
    ${week.stories.map((s,si) => `
      <div class="story-list-item" onclick="openStory(${wi},${si})">
        <div class="sli-night">${s.night}</div>
        <div>
          <div class="sli-title">${s.title}</div>
          <div class="sli-ref">${s.ref}</div>
        </div>
        <div class="sli-arrow">→</div>
      </div>
    `).join('')}
    <div class="seal">
      <p>${week.theme}</p>
      <cite>Week ${wi+1}</cite>
    </div>
  `;
}

function closeWeek(){
  currentWeek = null;
  currentStory = null;
  renderApp();
}

function renderStoryDetail(week, story, wi, si){
  const totalStories = week.stories.length;
  const hasNext = si < totalStories - 1;
  const hasPrev = si > 0;

  return `
    <button class="back-btn" onclick="closeStory()">← ${week.name}</button>

    <!-- VIVID STORY HEADER GRAPHIC -->
    <div class="story-header">
      ${headerGraphic(story.headerType, story.color, story.accentColor)}
    </div>

    <!-- STORY CARD -->
    <div class="story-card">
      <div class="story-meta">
        <div class="story-night">${story.night}</div>
        <div class="story-ref">${story.ref}</div>
      </div>
      <div class="story-title">${story.title}</div>
      <div class="story-body">

        <!-- STORY LINES -->
        <div class="story-lines">
          ${story.lines.map(l => `
            <div class="story-line">
              <div class="line-icon">${icon(l.icon)}</div>
              <div>${l.text}</div>
            </div>
          `).join('')}
        </div>

        <!-- ANCHOR VERSE -->
        <div class="verse-block">
          ${story.verse.text}
          <cite>${story.verse.cite}</cite>
        </div>

        <!-- SAY IT TOGETHER -->
        <div class="say-it">
          <span class="say-label">Say it together</span>
          <span class="say-text">${story.sayIt}</span>
        </div>

        <!-- BEDTIME PRAYER -->
        <div class="prayer-card">
          <h4>Tonight's Prayer</h4>
          <p>${story.prayer}</p>
          <cite>— Avynn's prayer for tonight</cite>
        </div>

        <!-- NAVIGATION -->
        <div style="display:flex;justify-content:space-between;margin-top:2rem;gap:1rem;">
          ${hasPrev ? `<button class="back-btn" onclick="openStory(${wi},${si-1})" style="font-size:12px;">← ${week.stories[si-1].title}</button>` : '<span></span>'}
          ${hasNext ? `<button class="back-btn" onclick="openStory(${wi},${si+1})" style="font-size:12px;color:var(--gold-bright);">${week.stories[si+1].title} →</button>` : `<button class="back-btn" onclick="closeStory()" style="font-size:12px;color:var(--gold-bright);">Week Complete ✦</button>`}
        </div>

      </div>
    </div>
  `;
}

function closeStory(){
  currentStory = null;
  renderApp();
}

function renderAbout(){
  return `
    <div class="sec-title">About This Archive</div>
    <div class="sec-sub">Made for Avynn Renee Campbell · With love</div>
    <p class="body-text">This archive was built as a nightly ritual — a way to plant the stories of God deep into Avynn's heart, one night at a time, before she closes her eyes.</p>
    <p class="body-text">Each story is written for a child — simple, vivid, true. Each prayer is written in her voice, so she can speak it herself. The "say it together" lines are meant to be spoken out loud between you.</p>
    <div class="divider"></div>
    <div class="verse-block">
      These words that I am giving you today are to be in your heart. Repeat them to your children. Talk about them when you sit in your house and when you walk along the road, when you lie down and when you get up.
      <cite>Deuteronomy 6:6-7 · CSB</cite>
    </div>
    <div class="divider"></div>
    <div class="sec-title" style="font-size:26px;margin-top:1.5rem;">The Eight Weeks</div>
    <div class="sec-sub">Forty stories across eight themes</div>
    ${WEEKS.map((w,i) => `
      <div style="padding:.9rem 0;border-bottom:1px solid var(--border);">
        <div style="font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--gold);font-weight:500;margin-bottom:3px;">Week ${i+1}</div>
        <div style="font-family:'Cormorant Garamond',serif;font-size:20px;color:var(--text);margin-bottom:2px;">${w.name}</div>
        <div style="font-size:13px;color:var(--text-muted);">${w.theme}</div>
      </div>
    `).join('')}
    <div class="seal">
      <p>Every story has a purpose. Every night has meaning.</p>
      <cite>Made for Avynn · With love · CSB</cite>
    </div>
  `;
}
</script>
